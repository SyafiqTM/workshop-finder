services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workshop-finder-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "file:/data/dev.db"
      PORT: "5000"
      JWT_SECRET: "replace-with-a-strong-secret"
      JWT_EXPIRES_IN: "7d"
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - backend_sqlite_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5000"
    container_name: workshop-finder-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  backend_sqlite_data:
